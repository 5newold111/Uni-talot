<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔮 ミスティック・タロット占い</title>
  <style>
:root {
  --bg-deep: #0d0b1f;
  --bg-mid: #1a1438;
  --gold: #e8c87a;
  --gold-soft: #c9a85f;
  --purple: #6b4f9e;
  --purple-light: #9d7fd1;
  --text: #ece8f5;
  --text-dim: #b3a9cf;
  --card-back: linear-gradient(145deg, #2a1f5c, #3d2a7a);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif JP", serif;
  background: radial-gradient(ellipse at top, var(--bg-mid), var(--bg-deep) 70%);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* 星空背景 */
.stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}
.star {
  position: absolute;
  background: #fff;
  border-radius: 50%;
  animation: twinkle var(--dur) ease-in-out infinite alternate;
  opacity: 0.7;
}
@keyframes twinkle {
  from { opacity: 0.15; transform: scale(0.8); }
  to   { opacity: 0.9; transform: scale(1.2); }
}

.header {
  text-align: center;
  padding: 2.5rem 1rem 1rem;
  position: relative;
  z-index: 1;
}
.header h1 {
  font-size: 2.4rem;
  letter-spacing: 0.1em;
  color: var(--gold);
  text-shadow: 0 0 20px rgba(232, 200, 122, 0.4);
}
.subtitle {
  margin-top: 0.6rem;
  color: var(--text-dim);
  font-size: 1rem;
  letter-spacing: 0.05em;
}

.container {
  max-width: 960px;
  margin: 0 auto;
  padding: 1.5rem 1rem 3rem;
  position: relative;
  z-index: 1;
}

.step { animation: fadeIn 0.6s ease; }
.hidden { display: none !important; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.step-title {
  text-align: center;
  font-size: 1.3rem;
  font-weight: normal;
  margin-bottom: 1.8rem;
  color: var(--gold);
  letter-spacing: 0.05em;
}

/* テーマ・スプレッド選択 */
.theme-grid, .spread-grid {
  display: grid;
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.theme-grid { grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); }
.spread-grid { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }

.choice-card {
  background: linear-gradient(145deg, rgba(61, 42, 122, 0.4), rgba(26, 20, 56, 0.6));
  border: 1px solid rgba(157, 127, 209, 0.3);
  border-radius: 16px;
  padding: 1.5rem 1rem;
  text-align: center;
  cursor: pointer;
  transition: all 0.25s ease;
}
.choice-card:hover {
  transform: translateY(-5px);
  border-color: var(--gold);
  box-shadow: 0 8px 30px rgba(232, 200, 122, 0.25);
}
.choice-card .icon { font-size: 2.4rem; display: block; margin-bottom: 0.5rem; }
.choice-card .label { font-size: 1.15rem; color: var(--gold); margin-bottom: 0.4rem; }
.choice-card .desc { font-size: 0.85rem; color: var(--text-dim); line-height: 1.5; }

/* デッキ（裏向きカードを並べる） */
.deck-area {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 6px;
  margin: 2rem auto;
  max-width: 760px;
}
.deck-card {
  width: 54px;
  height: 90px;
  border-radius: 8px;
  background: var(--card-back);
  border: 1px solid var(--gold-soft);
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  position: relative;
  flex-shrink: 0;
}
.deck-card::after {
  content: "✦";
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--gold-soft);
  font-size: 1.2rem;
  opacity: 0.6;
}
.deck-card:hover:not(.picked) {
  transform: translateY(-10px);
  box-shadow: 0 6px 20px rgba(232, 200, 122, 0.4);
}
.deck-card.picked {
  opacity: 0.25;
  cursor: default;
  transform: scale(0.9);
}
.deck-card.disabled { cursor: default; pointer-events: none; }

.draw-hint {
  text-align: center;
  color: var(--gold);
  font-size: 1.05rem;
  min-height: 1.6rem;
  letter-spacing: 0.05em;
}

/* 結果カード */
.result-cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  align-items: flex-start;
  gap: 1.5rem;
  margin-bottom: 2rem;
}
.tarot-result {
  width: 280px;
  background: linear-gradient(160deg, rgba(61, 42, 122, 0.35), rgba(13, 11, 31, 0.6));
  border: 1px solid rgba(157, 127, 209, 0.35);
  border-radius: 18px;
  padding: 1.4rem 1.2rem;
  text-align: center;
  animation: cardReveal 0.7s ease backwards;
}
@keyframes cardReveal {
  from { opacity: 0; transform: rotateY(90deg) scale(0.8); }
  to   { opacity: 1; transform: rotateY(0) scale(1); }
}
.tarot-result .position {
  display: inline-block;
  background: rgba(232, 200, 122, 0.15);
  color: var(--gold);
  font-size: 0.8rem;
  padding: 0.25rem 0.8rem;
  border-radius: 20px;
  margin-bottom: 0.9rem;
  letter-spacing: 0.1em;
}
.tarot-result .face {
  font-size: 3.4rem;
  margin: 0.4rem 0;
  display: inline-block;
  transition: transform 0.4s ease;
}
.tarot-result.reversed .face { transform: rotate(180deg); }
.tarot-result .card-name { font-size: 1.3rem; color: var(--gold); }
.tarot-result .card-name-en { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 0.3rem; }
.tarot-result .essence {
  font-size: 0.8rem;
  color: var(--purple-light);
  margin: 0.3rem 0 0.5rem;
  font-style: italic;
}
.tarot-result .orientation {
  font-size: 0.85rem;
  margin: 0.5rem 0 0.8rem;
  padding: 0.2rem 0;
  font-weight: bold;
}
.tarot-result .orientation.up { color: #8be8a0; }
.tarot-result .orientation.rev { color: #e89db3; }
.tarot-result .keywords {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 0.4rem;
  margin-bottom: 0.9rem;
}
.tarot-result .kw {
  font-size: 0.72rem;
  background: rgba(157, 127, 209, 0.2);
  color: var(--purple-light);
  padding: 0.18rem 0.6rem;
  border-radius: 12px;
}
.tarot-result .meaning {
  font-size: 0.92rem;
  line-height: 1.75;
  color: var(--text);
  text-align: left;
  margin-bottom: 0.8rem;
}
.tarot-result .advice {
  font-size: 0.86rem;
  line-height: 1.7;
  color: var(--text);
  text-align: left;
  background: rgba(232, 200, 122, 0.08);
  border-radius: 10px;
  padding: 0.7rem 0.8rem;
}
.tarot-result .advice .advice-label {
  display: block;
  color: var(--gold);
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  margin-bottom: 0.3rem;
}

.result-summary {
  max-width: 660px;
  margin: 0 auto 2rem;
  background: rgba(232, 200, 122, 0.08);
  border-left: 3px solid var(--gold);
  border-radius: 8px;
  padding: 1.4rem 1.6rem;
  line-height: 1.9;
  color: var(--text);
  font-size: 0.95rem;
}
.result-summary .summary-label {
  display: block;
  color: var(--gold);
  font-size: 0.85rem;
  letter-spacing: 0.1em;
  margin-bottom: 0.8rem;
}
.result-summary p { margin-bottom: 0.9rem; }
.result-summary p:last-child { margin-bottom: 0; }
.result-summary .arc-line {
  padding-left: 1rem;
  border-left: 2px solid rgba(157, 127, 209, 0.4);
  color: var(--text-dim);
  font-size: 0.9rem;
  margin-bottom: 0.5rem;
}
.result-summary .arc-line b { color: var(--gold); font-weight: normal; }
.result-summary .closing { color: var(--gold); }

/* ボタン */
.btn-primary {
  display: block;
  margin: 1.5rem auto 0;
  background: linear-gradient(135deg, var(--gold), var(--gold-soft));
  color: #1a1438;
  border: none;
  border-radius: 30px;
  padding: 0.9rem 2.4rem;
  font-size: 1.05rem;
  font-family: inherit;
  font-weight: bold;
  cursor: pointer;
  letter-spacing: 0.1em;
  transition: all 0.25s ease;
  box-shadow: 0 4px 20px rgba(232, 200, 122, 0.3);
}
.btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(232, 200, 122, 0.5); }

.btn-back {
  display: block;
  margin: 1.5rem auto 0;
  background: transparent;
  color: var(--text-dim);
  border: 1px solid rgba(157, 127, 209, 0.3);
  border-radius: 24px;
  padding: 0.5rem 1.4rem;
  font-size: 0.85rem;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s ease;
}
.btn-back:hover { color: var(--gold); border-color: var(--gold); }

.footer {
  text-align: center;
  padding: 1.5rem;
  color: var(--text-dim);
  font-size: 0.85rem;
  position: relative;
  z-index: 1;
}

@media (max-width: 600px) {
  .header h1 { font-size: 1.8rem; }
  .deck-card { width: 44px; height: 74px; }
  .tarot-result { width: 100%; max-width: 340px; }
}
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>

  <header class="header">
    <h1>🔮 ミスティック・タロット</h1>
    <p class="subtitle">心を静めて、運命のカードを引きましょう</p>
  </header>

  <main class="container">
    <!-- ステップ1: テーマ選択 -->
    <section class="step" id="step-theme">
      <h2 class="step-title">① 占いたいテーマを選んでください</h2>
      <div class="theme-grid" id="theme-grid"></div>
    </section>

    <!-- ステップ2: スプレッド選択 -->
    <section class="step hidden" id="step-spread">
      <h2 class="step-title">② 占い方を選んでください</h2>
      <div class="spread-grid" id="spread-grid"></div>
      <button class="btn-back" data-back="theme">← テーマを選び直す</button>
    </section>

    <!-- ステップ3: カードを引く -->
    <section class="step hidden" id="step-draw">
      <h2 class="step-title" id="draw-title">③ 心の中で願いを念じながらカードを引いてください</h2>
      <p class="draw-hint" id="draw-hint"></p>
      <div class="deck-area" id="deck-area"></div>
      <button class="btn-primary hidden" id="btn-reveal">結果を見る ✨</button>
      <button class="btn-back" data-back="spread">← 占い方を選び直す</button>
    </section>

    <!-- ステップ4: 結果 -->
    <section class="step hidden" id="step-result">
      <h2 class="step-title" id="result-title">あなたへの占い結果</h2>
      <div class="result-cards" id="result-cards"></div>
      <div class="result-summary" id="result-summary"></div>
      <button class="btn-primary" id="btn-restart">もう一度占う 🔄</button>
    </section>
  </main>

  <footer class="footer">
    <p>タロットは未来を決めるものではなく、心を映す鏡です 🌙</p>
  </footer>

// ===== 状態管理 =====
const state = { theme: null, spread: null, needed: 0, picks: [] };

// ===== 星空を生成 =====
function createStars() {
  const container = document.getElementById("stars");
  for (let i = 0; i < 80; i++) {
    const s = document.createElement("div");
    s.className = "star";
    const size = Math.random() * 2.5 + 1;
    s.style.width = s.style.height = size + "px";
    s.style.left = Math.random() * 100 + "%";
    s.style.top = Math.random() * 100 + "%";
    s.style.setProperty("--dur", (Math.random() * 3 + 2) + "s");
    s.style.animationDelay = Math.random() * 3 + "s";
    container.appendChild(s);
  }
}

// ===== 画面切り替え =====
function showStep(id) {
  document.querySelectorAll(".step").forEach(el => el.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// ===== ① テーマ選択 =====
function renderThemes() {
  const grid = document.getElementById("theme-grid");
  grid.innerHTML = "";
  for (const [key, t] of Object.entries(THEMES)) {
    const el = document.createElement("div");
    el.className = "choice-card";
    el.innerHTML = `<span class="icon">${t.icon}</span><span class="label">${t.name}</span>`;
    el.addEventListener("click", () => {
      state.theme = key;
      renderSpreads();
      showStep("step-spread");
    });
    grid.appendChild(el);
  }
}

// ===== ② スプレッド選択 =====
function renderSpreads() {
  const grid = document.getElementById("spread-grid");
  grid.innerHTML = "";
  for (const [key, s] of Object.entries(SPREADS)) {
    const el = document.createElement("div");
    el.className = "choice-card";
    el.innerHTML = `<span class="label">${s.name}</span><span class="desc">${s.desc}</span>`;
    el.addEventListener("click", () => {
      state.spread = key;
      state.needed = s.count;
      state.picks = [];
      renderDeck();
      showStep("step-draw");
    });
    grid.appendChild(el);
  }
}

// ===== ③ カードを引く =====
function renderDeck() {
  const area = document.getElementById("deck-area");
  area.innerHTML = "";
  const spread = SPREADS[state.spread];
  document.getElementById("draw-hint").textContent =
    `${spread.name}：あと ${state.needed} 枚 引いてください`;
  document.getElementById("btn-reveal").classList.add("hidden");

  const order = shuffle([...Array(TAROT_CARDS.length).keys()]);
  order.forEach(cardIndex => {
    const c = document.createElement("div");
    c.className = "deck-card";
    c.addEventListener("click", () => pickCard(c, cardIndex));
    area.appendChild(c);
  });
}

function pickCard(el, cardIndex) {
  if (el.classList.contains("picked")) return;
  if (state.picks.length >= state.needed) return;

  el.classList.add("picked");
  const reversed = Math.random() < 0.5;
  state.picks.push({ card: TAROT_CARDS[cardIndex], reversed });

  const remaining = state.needed - state.picks.length;
  const hint = document.getElementById("draw-hint");
  if (remaining > 0) {
    hint.textContent = `あと ${remaining} 枚 引いてください`;
  } else {
    hint.textContent = "すべてのカードが揃いました ✨";
    document.querySelectorAll(".deck-card:not(.picked)").forEach(d => d.classList.add("disabled"));
    document.getElementById("btn-reveal").classList.remove("hidden");
  }
}

// ===== ④ 結果表示 =====
function showResult() {
  const spread = SPREADS[state.spread];
  const theme = THEMES[state.theme];
  document.getElementById("result-title").textContent =
    `${theme.icon} ${theme.name} ・ ${spread.name} の結果`;

  const wrap = document.getElementById("result-cards");
  wrap.innerHTML = "";

  state.picks.forEach((pick, i) => {
    const { card, reversed } = pick;
    const data = (reversed ? card.reversed : card.upright)[state.theme];
    const el = document.createElement("div");
    el.className = "tarot-result" + (reversed ? " reversed" : "");
    el.style.animationDelay = (i * 0.25) + "s";
    el.innerHTML = `
      <span class="position">${spread.positions[i]}</span>
      <div class="face">${card.symbol}</div>
      <div class="card-name">${card.name}</div>
      <div class="card-name-en">${card.nameEn}</div>
      <div class="essence">― ${card.essence} ―</div>
      <div class="orientation ${reversed ? "rev" : "up"}">
        ${reversed ? "逆位置 (Reversed)" : "正位置 (Upright)"}
      </div>
      <div class="keywords">
        ${card.keywords.map(k => `<span class="kw">${k}</span>`).join("")}
      </div>
      <div class="meaning">${data.reading}</div>
      <div class="advice"><span class="advice-label">🌟 アドバイス</span>${data.advice}</div>
    `;
    wrap.appendChild(el);
  });

  document.getElementById("result-summary").innerHTML = buildSummary();
  showStep("step-result");
}

// ===== 引いたカードを関連づけた総合鑑定文 =====
function buildSummary() {
  const themeName = THEMES[state.theme].name;
  const spread = SPREADS[state.spread];
  const upCount = state.picks.filter(p => !p.reversed).length;
  const total = state.picks.length;

  let html = `<span class="summary-label">🌙 占い師からの総合鑑定</span>`;

  // 1枚引きと複数引きで導入を変える
  if (total === 1) {
    const p = state.picks[0];
    const ori = p.reversed ? "逆位置" : "正位置";
    html += `<p>あなたが引いたのは「<b style="color:var(--gold)">${p.card.name}</b>」の${ori}。` +
      `これは『${p.card.essence}』を象徴するカードです。今の${themeName}において、` +
      `このカードはまさにあなたの心の状態を映し出しています。</p>`;
  } else {
    // 各ポジションを一行で結びつけて「物語」にする
    html += `<p>${spread.name}に現れた${total}枚のカードは、一枚ずつ独立しているのではなく、` +
      `ひとつの流れとして${themeName}を物語っています。</p>`;
    state.picks.forEach((p, i) => {
      const ori = p.reversed ? "逆位置" : "正位置";
      html += `<div class="arc-line"><b>${spread.positions[i]}</b>： ` +
        `「${p.card.name}」（${ori}）— ${p.card.essence}</div>`;
    });
    html += buildArcNarrative();
  }

  // 正逆のバランスから全体のトーンを読む
  let tone;
  if (total > 1) {
    if (upCount === total) {
      tone = `引かれたカードがすべて正位置という、力強く前向きな配置です。今の${themeName}は、あなたの行動がそのまま良い結果へ結びつきやすい追い風の時。迷う理由があるとすれば、それは外側ではなくあなた自身の中の遠慮だけです。`;
    } else if (upCount === 0) {
      tone = `すべて逆位置という配置は、不運の宣告ではなく『立ち止まり、内側を見つめ直しなさい』という強いメッセージです。今は外に向かって押すより、自分の在り方や思い込みを整える時。ここで丁寧に向き合えば、流れは必ず変わります。`;
    } else {
      tone = `正位置と逆位置が混じり合うこの配置は、${themeName}が「変化と調整の只中」にあることを示します。追い風の部分は迷わず活かし、逆位置が指摘する弱点には正直に向き合う——その両輪が揃ったとき、状況は確実に良い方へ動き出します。`;
    }
    html += `<p>${tone}</p>`;
  }

  // 締めの一言（核心を突く）
  html += `<p class="closing">カードはあなたを縛るものではなく、心の奥で薄々気づいていたことを、` +
    `はっきりと言葉にしてくれる鏡です。出た結果をどう生かすか——最後の一手を選ぶのは、` +
    `いつだってあなた自身の意志であることを、どうか忘れないでください。</p>`;

  return html;
}

// スプレッド種別に応じた「流れ」の解説
function buildArcNarrative() {
  const names = state.picks.map(p => p.card.name);
  if (state.spread === "three") {
    return `<p>過去の「${names[0]}」が土台となり、現在の「${names[1]}」という局面を生みました。` +
      `そしてこの流れは、未来の「${names[2]}」へと向かおうとしています。` +
      `過去は変えられませんが、現在のカードが示す課題に今どう関わるかで、未来の現れ方は変わります。</p>`;
  }
  if (state.spread === "situation") {
    return `<p>今の現状である「${names[0]}」に対し、乗り越えるべき課題が「${names[1]}」として浮かび上がっています。` +
      `そして、その鍵を握るアドバイスが「${names[2]}」。この3枚目こそ、状況を動かすための具体的な処方箋です。</p>`;
  }
  return "";
}

// ===== ユーティリティ =====
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function restart() {
  state.theme = null;
  state.spread = null;
  state.picks = [];
  state.needed = 0;
  renderThemes();
  showStep("step-theme");
}

// ===== イベント登録 =====
document.getElementById("btn-reveal").addEventListener("click", showResult);
document.getElementById("btn-restart").addEventListener("click", restart);
document.querySelectorAll(".btn-back").forEach(btn => {
  btn.addEventListener("click", () => showStep("step-" + btn.dataset.back));
});

// ===== 初期化 =====
createStars();
renderThemes();
  </script>
</body>
