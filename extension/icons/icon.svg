<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- 背景 -->
  <rect width="128" height="128" rx="20" fill="#2c5364"/>

  <!-- 3D等角投影の家具 (キャビネット/箱) を表現 -->
  <!-- 天面 -->
  <polygon points="64,30 100,46 64,62 28,46" fill="#7eb6c4" stroke="#fff" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- 右面 -->
  <polygon points="100,46 100,86 64,102 64,62" fill="#3d6878" stroke="#fff" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- 左面 -->
  <polygon points="28,46 28,86 64,102 64,62" fill="#5694a6" stroke="#fff" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- 寸法表示の矢印 (右下に小さく) -->
  <g stroke="#fff" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.8">
    <line x1="106" y1="92" x2="118" y2="92"/>
    <polyline points="114,88 118,92 114,96"/>
  </g>
</svg>
