[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["output", "logs", ".venv"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long (formatter handles it)
    "B008",  # function calls in defaults (FastAPI uses it)
]

[tool.ruff.format]
quote-style = "double"
