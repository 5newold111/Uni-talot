[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["output", "logs", ".venv"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long (formatter handles it)
    "B008",  # function calls in defaults (FastAPI uses it)
]

[tool.ruff.format]
quote-style = "double"

[tool.coverage.run]
branch = true
source = ["routers", "services"]
omit = ["tests/*", "scripts/*"]

[tool.coverage.report]
show_missing = true
skip_covered = false
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]
fail_under = 70
