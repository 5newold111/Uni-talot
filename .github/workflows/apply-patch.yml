name: Apply patch (remote push helper)

# 開発環境からの git push が使えない場合の反映経路。
# 推奨: git diff を base64 化し 1900 バイトごとに分割して patches/parts/pNN として
# コミットし、patch_file に "parts" を指定する（分割アップロードで転送破損を防ぎ、
# 各チャンクをアップロード後にバイト比較で検証できる）。
# 注意: GITHUB_TOKEN によるコミットは他のワークフローを起動しないため、
# 反映後は "Deploy site to Netlify" を手動起動すること。

on:
  workflow_dispatch:
    inputs:
      patch_file:
        description: "リポジトリ内のパッチファイル（parts なら patches/parts/* を連結、.b64 なら base64 として解釈）"
        required: false
        type: string
      patch_b64:
        description: "base64-encoded git diff（patch_file が無い場合のみ使用）"
        required: false
        type: string
      message:
        description: "commit message"
        required: true
        type: string

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply and push
        env:
          PF: ${{ inputs.patch_file }}
          PB: ${{ inputs.patch_b64 }}
          MSG: ${{ inputs.message }}
        run: |
          if [ "$PF" = "parts" ]; then
            cat patches/parts/p* | base64 -d > /tmp/p.diff
          elif [ -n "$PF" ]; then
            case "$PF" in
              *.b64) base64 -d "$PF" > /tmp/p.diff ;;
              *)     cp "$PF" /tmp/p.diff ;;
            esac
          else
            printf '%s' "$PB" | base64 -d > /tmp/p.diff
          fi
          git apply --whitespace=nowarn /tmp/p.diff
          rm -rf patches
          git config user.name "5newold111"
          git config user.email "5newold111@gmail.com"
          git add -A
          git commit -m "$MSG"
          git push
