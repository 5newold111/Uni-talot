name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # ビルド時はDB不要（ページは force-dynamic）。CI用のダミー秘密鍵。
          AUTH_SECRET: ci-dummy-secret
          DATA_BACKEND: memory
