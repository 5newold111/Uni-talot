name: Album Release

# 毎月 1 日・15 日にアルバムをパッケージ化する。cron は UTC。
on:
  schedule:
    - cron: "0 1 1 * *"    # 毎月 1 日 01:00 UTC
    - cron: "0 1 15 * *"   # 毎月 15 日 01:00 UTC
  workflow_dispatch:

permissions:
  contents: write   # state/ コミット & Release 作成に必要

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build release package
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUNO_API_KEY: ${{ secrets.SUNO_API_KEY }}
          SUNO_BASE_URL: ${{ secrets.SUNO_BASE_URL }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python scripts/run_release.py --force

      - name: Upload release package (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.run_id }}
          path: output/releases/
          if-no-files-found: ignore
          retention-days: 90

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/ || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: album release state update"
            git push
          else
            echo "No state changes to commit."
          fi
